<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP8266 Control</title>
    <style>
        body { text-align: center; font-family: sans-serif;}
        .btn { padding: 20px; font-size: 20px; color: white; border: none; border-radius: 10px; cursor: pointer; position: absolute; top:0; bottom:0; left:0; right:0;}
        .ON { background: #ff4444; }
        .OFF { background: #44ff44; }
    </style>
</head>
<body>
    <form method="POST">
        <button type="submit" class="btn {{status}}">TOGGLE LED</button>
    </form>
</body>
</html>
